version: '3.8'

services:
  # ===== POSTGRES DATABASE =====
  postgres:
    image: postgres:15-alpine
    container_name: fasthub-postgres
    environment:
      POSTGRES_DB: fasthub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Trwałe przechowywanie danych (przetrwa restart)
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fasthub-network

  # ===== REDIS (dla Celery/cache) =====
  redis:
    image: redis:7-alpine
    container_name: fasthub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fasthub-network

  # ===== BACKEND (FastAPI) =====
  backend:
    build:
      context: ./fasthub-backend
      dockerfile: Dockerfile
    container_name: fasthub-backend
    ports:
      - "8000:8000"
    environment:
      # Database connection
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fasthub
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # CORS (dopuszczamy localhost:3000)
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      
      # JWT Secret — OVERRIDE via .env or Docker secrets in production!
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      
      # Environment
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount kodu - zmiany w kodzie = auto-reload
      - ./fasthub-backend:/app
      # Nie montuj venv (używamy tego z kontenera)
      - /app/venv
    command: >
      sh -c "
        echo '🔧 Running database migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations complete!' &&
        echo '🚀 Starting FastAPI server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - fasthub-network

  # ===== FRONTEND (React + Vite) =====
  frontend:
    build:
      context: ./fasthub-frontend
      dockerfile: Dockerfile
    container_name: fasthub-frontend
    ports:
      - "3000:3000"
    environment:
      # API URL (wskazuje na backend w sieci Docker)
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      # Mount kodu - zmiany = auto-reload
      - ./fasthub-frontend:/app
      # Nie montuj node_modules (używamy tego z kontenera )
      - /app/node_modules
    networks:
      - fasthub-network

# ===== VOLUMES (trwałe dane) =====
volumes:
  postgres_data:
    driver: local

# ===== NETWORK (wirtualna sieć dla kontenerów) =====
networks:
  fasthub-network:
    driver: bridge
