{% extends "base_layout.html" %}
{% block content %}
<h2 style="color:#333333; margin-top:0;">Zaproszenie do {{ org_name }}</h2>
<p style="color:#555555; line-height:1.6;"><strong>{{ inviter_name }}</strong> zaprasza Cie do organizacji <strong>{{ org_name }}</strong> z rola <strong>{{ role_name | default("member") }}</strong>.</p>
<p style="text-align:center; margin:30px 0;">
  <a href="{{ accept_url }}" style="background:{{ brand_color }}; color:#ffffff; padding:12px 30px; text-decoration:none; border-radius:5px; display:inline-block; font-weight:bold;">Dolacz do {{ org_name }}</a>
</p>
<p style="color:#999999; font-size:13px;">Zaproszenie wygasa za {{ expires_in | default("7 dni") }}.</p>
{% endblock %}
