{% extends "base_layout.html" %}
{% block content %}
<h2 style="color:#333333; margin-top:0;">Reset hasla</h2>
<p style="color:#555555; line-height:1.6;">Czesc {{ user_name }}, otrzymalismy prosbe o reset hasla. Kliknij przycisk ponizej:</p>
<p style="text-align:center; margin:30px 0;">
  <a href="{{ reset_url }}" style="background:{{ brand_color }}; color:#ffffff; padding:12px 30px; text-decoration:none; border-radius:5px; display:inline-block; font-weight:bold;">Zresetuj haslo</a>
</p>
<p style="color:#999999; font-size:13px;">Jesli to nie Ty — zignoruj ten email. Link wygasa za {{ expires_in | default("1 godzine") }}.</p>
{% endblock %}
