{% extends "base_layout.html" %}
{% block content %}
<h2 style="color:#333333; margin-top:0;">Potwierdz adres email</h2>
<p style="color:#555555; line-height:1.6;">Czesc {{ user_name }}, kliknij przycisk ponizej aby zweryfikowac swoj adres email:</p>
<p style="text-align:center; margin:30px 0;">
  <a href="{{ verify_url }}" style="background:{{ brand_color }}; color:#ffffff; padding:12px 30px; text-decoration:none; border-radius:5px; display:inline-block; font-weight:bold;">Potwierdz email</a>
</p>
<p style="color:#999999; font-size:13px;">Link wygasa za {{ expires_in | default("24 godziny") }}.</p>
{% endblock %}
