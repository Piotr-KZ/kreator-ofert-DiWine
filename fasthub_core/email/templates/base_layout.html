<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; font-family:Arial,Helvetica,sans-serif; background:#f4f4f7;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7; padding:20px 0;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden;">
  <!-- Header -->
  <tr>
    <td style="background:{{ brand_color }}; padding:24px; text-align:center;">
      {% if logo_url %}<img src="{{ logo_url }}" alt="{{ app_name }}" style="max-height:40px;">{% endif %}
      <h1 style="color:#ffffff; margin:{% if logo_url %}8px{% else %}0{% endif %} 0 0; font-size:22px;">{{ app_name }}</h1>
    </td>
  </tr>
  <!-- Content -->
  <tr>
    <td style="padding:32px 40px;">
      {% block content %}{% endblock %}
    </td>
  </tr>
  <!-- Footer -->
  <tr>
    <td style="padding:20px 40px; text-align:center; color:#999999; font-size:12px; border-top:1px solid #eeeeee;">
      {{ app_name }}{% if company_address %} | {{ company_address }}{% endif %}
    </td>
  </tr>
</table>
</td></tr>
</table>
</body>
</html>
