{% extends "base_layout.html" %}
{% block content %}
<h2 style="color:#333333; margin-top:0;">Witaj, {{ user_name }}!</h2>
<p style="color:#555555; line-height:1.6;">Twoje konto w <strong>{{ org_name | default(app_name) }}</strong> zostalo utworzone.</p>
<p style="color:#555555; line-height:1.6;">Aby rozpoczac, kliknij przycisk ponizej:</p>
<p style="text-align:center; margin:30px 0;">
  <a href="{{ dashboard_url }}" style="background:{{ brand_color }}; color:#ffffff; padding:12px 30px; text-decoration:none; border-radius:5px; display:inline-block; font-weight:bold;">Przejdz do panelu</a>
</p>
{% endblock %}
