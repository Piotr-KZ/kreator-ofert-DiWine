name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: fasthub-frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd fasthub-frontend
          npm ci
      
      - name: Build check
        run: |
          cd fasthub-frontend
          npm run build
        env:
          VITE_API_URL: http://localhost:8001/api/v1
          VITE_APP_NAME: WebCreator
