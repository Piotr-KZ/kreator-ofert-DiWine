# =============================================================================
# FastHub — Render Blueprint (Infrastructure as Code)
# =============================================================================
# Kliknij "Deploy to Render" i za 5 minut masz dzialajacy system.
#
# PO PIERWSZYM DEPLOY'U ustaw recznie 2 zmienne:
#   1. fasthub-frontend → VITE_API_URL = https://<twoj-backend>.onrender.com/api/v1
#   2. fasthub-backend  → BACKEND_CORS_ORIGINS = ["https://<twoj-frontend>.onrender.com"]
# Potem kliknij "Manual Deploy" na obu serwisach.
# =============================================================================

databases:
  - name: fasthub-db
    plan: free
    databaseName: fasthub
    user: fasthub
    region: frankfurt

services:
  # ----- Redis (cache, rate limiting, pub/sub) -----
  - type: redis
    name: fasthub-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ----- Backend API (FastAPI + Python 3.11) -----
  - type: web
    name: fasthub-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -e . && cd fasthub-backend && pip install -r requirements.txt
    startCommand: cd fasthub-backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fasthub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fasthub-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: BACKEND_CORS_ORIGINS
        sync: false  # Ustaw po deploy: ["https://<frontend>.onrender.com"]
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ----- Frontend (React — static site + CDN) -----
  - type: web
    name: fasthub-frontend
    env: static
    region: frankfurt
    buildCommand: cd fasthub-frontend && npm install && npm run build
    staticPublishPath: fasthub-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false  # Ustaw po deploy: https://<backend>.onrender.com/api/v1
